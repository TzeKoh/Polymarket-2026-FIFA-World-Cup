<!--
  ============================================================
  Polymarket 2026 FIFA World Cup Widget — Shopify Ready
  ============================================================
  INSTALLATION:
    1. In your Shopify admin go to Online Store → Themes → Edit Code
    2. Open the page template or section where you want the widget
    3. Paste this entire block (or embed inside a <div>)
    4. Change API_URL below to wherever your Python server is hosted
       e.g. https://your-vps.com/api/worldcup
  ============================================================
-->

<style>
  /* ── Google Font ── */
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --pm-green:    #00e676;
    --pm-red:      #ff5252;
    --pm-gold:     #ffd700;
    --pm-silver:   #c0c0c0;
    --pm-bronze:   #cd7f32;
    --pm-bg:       #0d1117;
    --pm-card:     #161b22;
    --pm-border:   #30363d;
    --pm-text:     #e6edf3;
    --pm-muted:    #8b949e;
    --pm-accent:   #58a6ff;
  }

  #pm-wc-widget * { box-sizing: border-box; font-family: 'Inter', sans-serif; }

  #pm-wc-widget {
    background: var(--pm-bg);
    border: 1px solid var(--pm-border);
    border-radius: 16px;
    padding: 24px;
    color: var(--pm-text);
    max-width: 900px;
    margin: 0 auto;
  }

  /* ── Header ── */
  .pm-header {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 20px;
  }
  .pm-title {
    font-size: 1.4rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .pm-title span.pm-badge {
    font-size: 0.65rem;
    font-weight: 600;
    background: rgba(0,230,118,.15);
    color: var(--pm-green);
    border: 1px solid var(--pm-green);
    border-radius: 20px;
    padding: 2px 10px;
    letter-spacing: .5px;
    animation: pm-pulse 2s infinite;
  }
  @keyframes pm-pulse {
    0%,100% { opacity:1 } 50% { opacity:.5 }
  }
  .pm-meta {
    font-size: 0.75rem;
    color: var(--pm-muted);
    text-align: right;
    line-height: 1.6;
  }

  /* ── Stats row ── */
  .pm-stats {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 20px;
  }
  .pm-stat {
    flex: 1 1 160px;
    background: var(--pm-card);
    border: 1px solid var(--pm-border);
    border-radius: 10px;
    padding: 12px 16px;
  }
  .pm-stat-label { font-size: .7rem; color: var(--pm-muted); text-transform: uppercase; letter-spacing: .5px; }
  .pm-stat-value { font-size: 1.1rem; font-weight: 700; margin-top: 4px; }

  /* ── Table ── */
  .pm-table-wrap { overflow-x: auto; }
  table.pm-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.875rem;
  }
  table.pm-table th {
    text-align: left;
    padding: 10px 12px;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: .5px;
    color: var(--pm-muted);
    border-bottom: 1px solid var(--pm-border);
    white-space: nowrap;
  }
  table.pm-table td {
    padding: 11px 12px;
    border-bottom: 1px solid rgba(48,54,61,.5);
    vertical-align: middle;
    white-space: nowrap;
  }
  table.pm-table tr:last-child td { border-bottom: none; }
  table.pm-table tbody tr { transition: background .15s; }
  table.pm-table tbody tr:hover { background: rgba(88,166,255,.06); }

  /* ── Rank medal ── */
  .pm-rank {
    font-weight: 700;
    font-size: 0.9rem;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .pm-rank.r1 { background: rgba(255,215,0,.2);   color: var(--pm-gold);   border: 1px solid var(--pm-gold); }
  .pm-rank.r2 { background: rgba(192,192,192,.2); color: var(--pm-silver); border: 1px solid var(--pm-silver); }
  .pm-rank.r3 { background: rgba(205,127,50,.2);  color: var(--pm-bronze); border: 1px solid var(--pm-bronze); }
  .pm-rank.rx { background: rgba(139,148,158,.1); color: var(--pm-muted);  border: 1px solid var(--pm-border); }

  /* ── Probability bar ── */
  .pm-prob-wrap { min-width: 140px; }
  .pm-prob-bar-bg {
    height: 6px;
    background: rgba(255,255,255,.08);
    border-radius: 3px;
    margin-top: 5px;
    overflow: hidden;
  }
  .pm-prob-bar {
    height: 6px;
    border-radius: 3px;
    background: linear-gradient(90deg, #58a6ff, #00e676);
    transition: width .8s ease;
  }
  .pm-prob-text { font-weight: 700; font-size: 1rem; color: var(--pm-accent); }

  /* ── Change badges ── */
  .pm-change {
    font-size: .75rem;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 20px;
  }
  .pm-change.up   { background: rgba(0,230,118,.15); color: var(--pm-green); }
  .pm-change.down { background: rgba(255,82,82,.15);  color: var(--pm-red); }
  .pm-change.flat { background: rgba(139,148,158,.1); color: var(--pm-muted); }

  /* ── Status pill ── */
  .pm-status { font-size: .68rem; font-weight: 600; border-radius: 20px; padding: 2px 9px; }
  .pm-status.open   { background: rgba(0,230,118,.15); color: var(--pm-green); }
  .pm-status.closed { background: rgba(255,82,82,.15);  color: var(--pm-red); }

  /* ── Flag ── */
  .pm-flag { width: 28px; height: 20px; border-radius: 3px; object-fit: cover; }
  .pm-team-cell { display: flex; align-items: center; gap: 10px; font-weight: 600; }

  /* ── Footer ── */
  .pm-footer {
    margin-top: 16px;
    text-align: center;
    font-size: .7rem;
    color: var(--pm-muted);
  }
  .pm-footer a { color: var(--pm-accent); text-decoration: none; }
  .pm-footer a:hover { text-decoration: underline; }

  /* ── Loader ── */
  .pm-loader {
    text-align: center;
    padding: 60px;
    color: var(--pm-muted);
    font-size: 1rem;
  }
  .pm-loader::after { content: ''; animation: pm-dots 1.2s infinite; }
  @keyframes pm-dots { 0%{content:''} 33%{content:'.'} 66%{content:'..'} 100%{content:'...'} }

  /* ── Error ── */
  .pm-error {
    text-align: center;
    padding: 40px;
    color: var(--pm-red);
    font-size: .9rem;
  }
</style>

<div id="pm-wc-widget">
  <div class="pm-loader" id="pm-loading">Loading live data</div>
  <div id="pm-content" style="display:none"></div>
  <div class="pm-error" id="pm-error" style="display:none"></div>
</div>

<script>
(function() {
  // ── CONFIG: change this to your server address ────────────────────────────
  var API_URL = "http://localhost:5000/api/worldcup";
  var REFRESH_INTERVAL_MS = 60000;   // Auto-refresh every 60 s
  // ─────────────────────────────────────────────────────────────────────────

  var widget  = document.getElementById("pm-wc-widget");
  var content = document.getElementById("pm-content");
  var loader  = document.getElementById("pm-loading");
  var errBox  = document.getElementById("pm-error");

  function fmt(num, decimals) {
    if (num === null || num === undefined) return "—";
    return Number(num).toLocaleString("en-US", { maximumFractionDigits: decimals || 0 });
  }

  function fmtUSD(num) {
    if (!num) return "$0";
    if (num >= 1e6) return "$" + (num / 1e6).toFixed(1) + "M";
    if (num >= 1e3) return "$" + (num / 1e3).toFixed(1) + "K";
    return "$" + fmt(num, 2);
  }

  function changeHtml(val) {
    if (val === null || val === undefined) return '<span class="pm-change flat">—</span>';
    var cls  = val > 0 ? "up" : val < 0 ? "down" : "flat";
    var sign = val > 0 ? "▲ +" : val < 0 ? "▼ " : "";
    return '<span class="pm-change ' + cls + '">' + sign + fmt(val, 2) + '%</span>';
  }

  function rankHtml(r) {
    var cls = r === 1 ? "r1" : r === 2 ? "r2" : r === 3 ? "r3" : "rx";
    return '<span class="pm-rank ' + cls + '">' + r + '</span>';
  }

  function render(data) {
    var teams = data.teams || [];
    var maxProb = teams.length ? teams[0].probability_pct : 1;

    var statsHtml =
      '<div class="pm-stats">' +
        '<div class="pm-stat"><div class="pm-stat-label">Total Volume</div><div class="pm-stat-value">' + fmtUSD(data.total_volume) + '</div></div>' +
        '<div class="pm-stat"><div class="pm-stat-label">Total Liquidity</div><div class="pm-stat-value">' + fmtUSD(data.total_liquidity) + '</div></div>' +
        '<div class="pm-stat"><div class="pm-stat-label">24h Volume</div><div class="pm-stat-value">' + fmtUSD(data.volume_24h) + '</div></div>' +
        '<div class="pm-stat"><div class="pm-stat-label">Market Status</div><div class="pm-stat-value"><span class="pm-status ' + (data.event_status === "OPEN" ? "open" : "closed") + '">' + data.event_status + '</span></div></div>' +
      '</div>';

    var rows = teams.map(function(t) {
      var barPct = maxProb > 0 ? (t.probability_pct / maxProb * 100).toFixed(1) : 0;
      return '<tr>' +
        '<td>' + rankHtml(t.rank) + '</td>' +
        '<td><div class="pm-team-cell">' +
          (t.image ? '<img class="pm-flag" src="' + t.image + '" alt="' + t.team + '" loading="lazy">' : '') +
          '<span>' + t.team + '</span>' +
        '</div></td>' +
        '<td><div class="pm-prob-wrap"><div class="pm-prob-text">' + fmt(t.probability_pct, 2) + '%</div>' +
          '<div class="pm-prob-bar-bg"><div class="pm-prob-bar" style="width:' + barPct + '%"></div></div>' +
        '</div></td>' +
        '<td>$' + fmt(t.last_price, 4) + '</td>' +
        '<td>$' + fmt(t.best_bid, 4) + ' / $' + fmt(t.best_ask, 4) + '</td>' +
        '<td>' + changeHtml(t.week_change_pct) + '</td>' +
        '<td>' + fmtUSD(t.volume_24h) + '</td>' +
        '<td>' + fmtUSD(t.liquidity) + '</td>' +
        '<td><span class="pm-status ' + (t.status === "OPEN" ? "open" : "closed") + '">' + t.status + '</span></td>' +
      '</tr>';
    }).join("");

    var now = new Date();
    var timeStr = now.toLocaleTimeString();

    content.innerHTML =
      '<div class="pm-header">' +
        '<div class="pm-title">⚽ ' + data.event_title + ' <span class="pm-badge">LIVE</span></div>' +
        '<div class="pm-meta">Source: Polymarket &nbsp;|&nbsp; Refreshed: ' + timeStr + '</div>' +
      '</div>' +
      statsHtml +
      '<div class="pm-table-wrap">' +
        '<table class="pm-table">' +
          '<thead><tr>' +
            '<th>#</th>' +
            '<th>Team</th>' +
            '<th>Win Probability</th>' +
            '<th>Last Price</th>' +
            '<th>Bid / Ask</th>' +
            '<th>7d Change</th>' +
            '<th>24h Volume</th>' +
            '<th>Liquidity</th>' +
            '<th>Status</th>' +
          '</tr></thead>' +
          '<tbody>' + rows + '</tbody>' +
        '</table>' +
      '</div>' +
      '<div class="pm-footer">Data sourced from <a href="https://polymarket.com/event/2026-fifa-world-cup-winner-595" target="_blank">Polymarket</a>. Auto-updates every 60 seconds. Not financial advice.</div>';

    loader.style.display  = "none";
    errBox.style.display  = "none";
    content.style.display = "block";
  }

  function fetchData() {
    fetch(API_URL)
      .then(function(r) {
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      })
      .then(function(data) {
        if (data.error) throw new Error(data.error);
        render(data);
      })
      .catch(function(err) {
        console.error("Polymarket widget error:", err);
        if (content.style.display === "none") {
          // First load – show error
          loader.style.display  = "none";
          errBox.style.display  = "block";
          errBox.textContent    = "⚠️ Could not load data: " + err.message + ". Retrying…";
        }
        // If we already have data showing, silently retry
      });
  }

  // Initial fetch
  fetchData();

  // Auto-refresh
  setInterval(fetchData, REFRESH_INTERVAL_MS);
})();
</script>
